name: MLX Swift iPhone App Build (Ultra Verbose)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-app:
    name: Build MLX Swift iPhone app with Xcode
    runs-on: macos-15
    timeout-minutes: 120

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      XCODE_SCHEME: MLXChatExample
      XCODE_CONFIGURATION: Debug
      IOS_SIMULATOR_NAME: iPhone 16
      IOS_SIMULATOR_OS: latest

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and Xcode details
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== RUNNER ==="
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          echo "=== XCODE ==="
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devicetypes | sed -n '1,120p'
          echo "=== FILESYSTEM ==="
          pwd
          ls -la

      - name: Clone MLX Swift examples repository
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-swift-examples.git
          cd mlx-swift-examples
          echo "=== GIT INFO ==="
          git rev-parse HEAD
          git status
          git log -1 --stat
          echo "=== TOP LEVEL ==="
          ls -la
          echo "=== PROJECT-LIKE FILES ==="
          find . \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "Package.swift" \) | sort

      - name: Inspect repository layout ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          echo "=== DIRECTORY PREVIEW ==="
          find . -maxdepth 3 -type d | sort | sed -n '1,300p'
          echo "=== FILE PREVIEW ==="
          find . -maxdepth 3 -type f | sort | sed -n '1,400p'

      - name: Resolve Xcode project or workspace
        id: resolve_project
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          WORKSPACE="$(find . -maxdepth 3 -name "*.xcworkspace" | sort | head -n 1 || true)"
          PROJECT="$(find . -maxdepth 3 -name "*.xcodeproj" | sort | head -n 1 || true)"

          echo "Resolved workspace: ${WORKSPACE:-<none>}"
          echo "Resolved project: ${PROJECT:-<none>}"

          if [ -n "${WORKSPACE}" ]; then
            echo "container_type=workspace" >> "$GITHUB_OUTPUT"
            echo "container_path=${WORKSPACE}" >> "$GITHUB_OUTPUT"
          elif [ -n "${PROJECT}" ]; then
            echo "container_type=project" >> "$GITHUB_OUTPUT"
            echo "container_path=${PROJECT}" >> "$GITHUB_OUTPUT"
          else
            echo "No .xcworkspace or .xcodeproj found." >&2
            exit 1
          fi

      - name: Show schemes
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          if [ "${{ steps.resolve_project.outputs.container_type }}" = "workspace" ]; then
            xcodebuild -list -workspace "${{ steps.resolve_project.outputs.container_path }}"
          else
            xcodebuild -list -project "${{ steps.resolve_project.outputs.container_path }}"
          fi

      - name: Boot iPhone simulator
        shell: bash
        run: |
          set -euxo pipefail

          DEVICE_UDID="$(xcrun simctl list devices available | grep "${IOS_SIMULATOR_NAME}" | head -n 1 | sed -E 's/.*\(([-A-F0-9]+)\).*/\1/' || true)"

          if [ -z "${DEVICE_UDID}" ]; then
            echo "Could not find simulator named ${IOS_SIMULATOR_NAME}" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator UDID: ${DEVICE_UDID}"
          xcrun simctl boot "${DEVICE_UDID}" || true
          xcrun simctl bootstatus "${DEVICE_UDID}" -b
          xcrun simctl list devices | sed -n '1,200p'

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          if [ "${{ steps.resolve_project.outputs.container_type }}" = "workspace" ]; then
            xcodebuild \
              -resolvePackageDependencies \
              -workspace "${{ steps.resolve_project.outputs.container_path }}" \
              -scheme "${XCODE_SCHEME}"
          else
            xcodebuild \
              -resolvePackageDependencies \
              -project "${{ steps.resolve_project.outputs.container_path }}" \
              -scheme "${XCODE_SCHEME}"
          fi

      - name: Build iPhone app for iOS Simulator ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          DESTINATION="platform=iOS Simulator,name=${IOS_SIMULATOR_NAME},OS=${IOS_SIMULATOR_OS}"

          if [ "${{ steps.resolve_project.outputs.container_type }}" = "workspace" ]; then
            xcodebuild \
              -workspace "${{ steps.resolve_project.outputs.container_path }}" \
              -scheme "${XCODE_SCHEME}" \
              -configuration "${XCODE_CONFIGURATION}" \
              -destination "${DESTINATION}" \
              -derivedDataPath "${PWD}/DerivedData" \
              -resultBundlePath "${PWD}/BuildResults.xcresult" \
              -skipMacroValidation \
              -showBuildTimingSummary \
              -verbose \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            xcodebuild \
              -project "${{ steps.resolve_project.outputs.container_path }}" \
              -scheme "${XCODE_SCHEME}" \
              -configuration "${XCODE_CONFIGURATION}" \
              -destination "${DESTINATION}" \
              -derivedDataPath "${PWD}/DerivedData" \
              -resultBundlePath "${PWD}/BuildResults.xcresult" \
              -skipMacroValidation \
              -showBuildTimingSummary \
              -verbose \
              CODE_SIGNING_ALLOWED=NO \
              build
          fi

      - name: Show build products
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          echo "=== DERIVED DATA ==="
          du -sh DerivedData || true
          find DerivedData -maxdepth 6 \( -name "*.app" -o -name "*.framework" -o -name "*.swiftmodule" \) | sort | sed -n '1,300p' || true
          echo "=== XCRESULT ==="
          ls -lah BuildResults.xcresult || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-ios-build-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift-examples/BuildResults.xcresult
            mlx-swift-examples/DerivedData
